# system.conf - 系统配置文件
# 基于RK3588的嵌入式多终端通信系统

[system]
name = RK3588多终端通信系统
version = 1.0.0
log_level = INFO
log_file = /tmp/rk3588_comm.log

[router]
port = 9000
max_connections = 32
heartbeat_interval = 5
heartbeat_timeout = 15

[protocol]
version = 1
max_payload = 1024
crc_check = true

[storage]
db_path = /tmp/rk3588_comm.db
max_log_days = 30
flush_interval = 5

[monitor]
check_interval = 3
enable_auto_restart = true
